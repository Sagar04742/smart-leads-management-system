version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports: ['27017:27017']
    volumes: [mongo_data:/data/db]

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ['5000:5000']
    depends_on: [mongo]
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ['5173:80']
    depends_on: [backend]

volumes:
  mongo_data:
